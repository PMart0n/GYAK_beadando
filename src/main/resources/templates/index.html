<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mozi Adatbázis</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #007BFF; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h1>Mozik és Filmek Nyilvántartása (GYAK_beadando)</h1>

<h2>Filmek listája</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Cím</th>
        <th>Év</th>
        <th>Hossz (perc)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="film : ${filmek}">
        <td th:text="${film.id}"></td>
        <td th:text="${film.cim}"></td>
        <td th:text="${film.ev}"></td>
        <td th:text="${film.hossz}"></td>
    </tr>
    </tbody>
</table>

<h2>Mozik listája</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Név</th>
        <th>Város</th>
        <th>Férőhely</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="mozi : ${mozik}">
        <td th:text="${mozi.id}"></td>
        <td th:text="${mozi.nev}"></td>
        <td th:text="${mozi.varos}"></td>
        <td th:text="${mozi.ferohely}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
