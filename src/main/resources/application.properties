
spring.application.name=GYAK_beadando

# Port beállítás
server.port=8888

# Adatbázis kapcsolat (Helyi XAMPP/MySQL)
# FONTOS: A 'beadando_db' majd lecserelni
spring.datasource.url=jdbc:mysql://localhost:3306/beadando_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate beállítások (Java automatikusan frissítse a táblákat)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true